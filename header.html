<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #030507;
            --accent: #2eb6d1;
            --text-dim: #94a3b8;
            --glass: rgba(3, 5, 7, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .header_section {
            width: 100%;
            height: 80px;
            padding: 0 8%;
            background: var(--glass);
            backdrop-filter: blur(12px);
            /* High-end Glass effect */
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            /* Fixed is better for this design */
            top: 0;
            left: 0;
            z-index: 2000;
            border-bottom: 1px solid var(--border);
        }

        /* Branding */
        .header_section .title_div {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-code);
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
        }

        .header_section .title_div a {
            text-decoration: none;
            color: #fff;
            transition: color 0.3s ease;
        }

        .header_section .title_div span {
            color: var(--accent);
            font-size: 24px;
        }

        .header_section .title_div:hover a {
            color: var(--accent);
        }

        /* Desktop Navigation */
        .header_section nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .header_section nav a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-family: var(--font-main);
            font-weight: 400;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .header_section nav a:hover {
            color: #fff;
        }

        /* Underline indicator for the Architect look */
        .header_section nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .header_section nav a:hover::after {
            width: 100%;
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            cursor: pointer;
            color: white;
            z-index: 2001;
        }

        #menu-checkbox {
            display: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .header_section {
                padding: 0 5%;
            }

            .menu-toggle {
                display: block;
            }

            .header_section nav {
                position: fixed;
                top: 0;
                right: 0;
                width: 70%;
                height: 100vh;
                background: #05080a;
                border-left: 1px solid var(--border);
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
                padding-left: 15%;
                gap: 40px;
                transform: translateX(100%);
                transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            }

            #menu-checkbox:checked~nav {
                transform: translateX(0);
                box-shadow: -20px 0 60px rgba(0, 0, 0, 0.5);
            }

            .header_section nav a {
                font-size: 1.5rem;
                font-weight: 600;
                color: #fff;
            }
        }
    </style>
</head>

<body>

    <section class="header_section">
        <div class="title_div">
            <span class="material-symbols-outlined">terminal</span>
            <a href="index.html">BaghdadDevLab</a>
        </div>

        <input type="checkbox" id="menu-checkbox">

        <label for="menu-checkbox" class="menu-toggle">
            <span class="material-symbols-outlined">drag_handle</span>
        </label>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="about.html">About</a>
            <a href="contacts.html">Contact</a>
        </nav>
    </section>

</body>

</html>

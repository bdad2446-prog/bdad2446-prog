<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaghdadDevLab</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <style>
        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        .header_section {
            width: 100%;
            height: 70px;
            /* Increased slightly for better visual balance */
            padding: 0 5%;
            background-color: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header_section .title_div {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2eb6d1;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .header_section .title_div a {
            text-decoration: none;
            color: #2eb6d1;
        }

        /* Desktop Navigation */
        .header_section nav {
            display: flex;
            align-items: center;
        }

        .header_section nav a {
            margin-left: 25px;
            text-decoration: none;
            color: white;
            font-size: 0.95rem;
            transition: 0.3s ease;
        }

        .header_section nav a:hover {
            color: #2eb6d1;
        }

        /* Mobile Menu Toggle (Hidden on Desktop) */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            color: white;
        }

        #menu-checkbox {
            display: none;
        }

        /* Responsive Breakpoint (Tablet/Mobile) */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
            }

            .header_section nav {
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background-color: rgba(0, 0, 0, 0.95);
                flex-direction: column;
                padding: 20px 0;
                /* Slide up effect */
                transform: translateY(-150%);
                transition: transform 0.4s ease-in-out;
                z-index: -1;
            }

            /* When checkbox is checked, show the menu */
            #menu-checkbox:checked~nav {
                transform: translateY(0);
            }

            .header_section nav a {
                margin: 15px 0;
                font-size: 1.1rem;
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <section class="header_section">
        <div class="title_div">
            <span class="material-symbols-outlined">code_xml</span>
            <a href="index.html">BaghdadDevLab</a>
        </div>

        <input type="checkbox" id="menu-checkbox">

        <label for="menu-checkbox" class="menu-toggle">
            <span class="material-symbols-outlined">menu</span>
        </label>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="services.html">Services</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="about.html">About</a>
            <a href="contacts.html">Contact</a>
        </nav>
    </section>

</body>

</html>
